# Docker Compose 配置文件
# 一键启动整个项目：docker-compose up -d

services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: go-api-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: go_api_starter
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: [
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-time-zone=+08:00'
    ]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - app-network

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: go-api-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      TZ: Asia/Shanghai
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - app-network

  # Go API 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-api-app
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped
    networks:
      - app-network

# 数据卷
volumes:
  mysql_data:
    name: go-api-mysql-data
  redis_data:
    name: go-api-redis-data

# 网络配置
networks:
  app-network:
    name: go-api-network
    driver: bridge
